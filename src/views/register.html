<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Express JWT App</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Patrick+Hand&display=swap');
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Patrick Hand', cursive;
      background-color: #fdfbf7;
      background-image: 
        linear-gradient(#e8d5b7 1px, transparent 1px);
      background-size: 100% 28px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      left: 60px;
      top: 0;
      bottom: 0;
      width: 3px;
      background: #ff6b6b;
    }
    .container {
      background: #fffef9;
      padding: 2.5rem;
      border-radius: 5px;
      box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 380px;
      border: 2px solid #d4c4a8;
    }
    h1 {
      text-align: center;
      color: #4a3520;
      margin-bottom: 1.5rem;
      font-family: 'Caveat', cursive;
      font-size: 2.5rem;
      border-bottom: 2px dashed #d4c4a8;
      padding-bottom: 0.5rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      margin-bottom: 0.3rem;
      color: #5c4033;
      font-weight: bold;
      font-size: 1.2rem;
    }
    input {
      width: 100%;
      padding: 0.6rem;
      border: 2px solid #d4c4a8;
      border-radius: 3px;
      font-size: 1.1rem;
      font-family: 'Patrick Hand', cursive;
      background: #fffef9;
    }
    input:focus {
      outline: none;
      border-color: #8b4513;
      background: #fff;
    }
    button {
      width: 100%;
      padding: 0.7rem;
      background: #8b4513;
      color: #fffaf0;
      border: 2px solid #654321;
      border-radius: 3px;
      font-size: 1.2rem;
      font-family: 'Patrick Hand', cursive;
      cursor: pointer;
      margin-top: 1rem;
    }
    button:hover {
      background: #654321;
    }
    .login-link {
      text-align: center;
      margin-top: 1.2rem;
      color: #5c4033;
      font-size: 1.1rem;
    }
    .login-link a {
      color: #8b4513;
      text-decoration: none;
      font-weight: bold;
    }
    .login-link a:hover {
      text-decoration: underline;
    }
    #message {
      padding: 0.75rem;
      border-radius: 5px;
      margin-bottom: 1rem;
      display: none;
      font-size: 1.1rem;
    }
    #message.error {
      background: #fde8e8;
      color: #922b21;
      border: 2px solid #c0392b;
      display: block;
    }
    #message.success {
      background: #e8f5e9;
      color: #2d5a27;
      border: 2px solid #27ae60;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Registrarse</h1>
    <div id="message"></div>
    <form id="registerForm">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit">Registrarse</button>
    </form>
    <div class="login-link">
      ¿Ya tienes cuenta? <a href="/login.html">Inicia sesión aquí</a>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const messageDiv = document.getElementById('message');

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, email, password })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify({
            username: data.username,
            email: data.email
          }));
          messageDiv.textContent = 'Registro exitoso! Redirigiendo...';
          messageDiv.className = 'success';
          setTimeout(() => {
            window.location.href = '/products.html';
          }, 1000);
        } else {
          messageDiv.textContent = data.message || 'Error en el registro';
          messageDiv.className = 'error';
        }
      } catch (error) {
        messageDiv.textContent = 'Error de conexión';
        messageDiv.className = 'error';
      }
    });
  </script>
</body>
</html>
