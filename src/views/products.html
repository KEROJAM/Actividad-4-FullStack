<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - Express JWT App</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Patrick+Hand&display=swap');
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Patrick Hand', cursive;
      background-color: #fdfbf7;
      background-image: 
        linear-gradient(#e8d5b7 1px, transparent 1px);
      background-size: 100% 28px;
      min-height: 100vh;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      left: 60px;
      top: 0;
      bottom: 0;
      width: 3px;
      background: #ff6b6b;
      z-index: 100;
    }
    header {
      background: #8b4513;
      color: #fffaf0;
      padding: 1rem 2rem 1rem 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 4px solid #654321;
      font-family: 'Caveat', cursive;
      font-size: 1.5rem;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logout-btn {
      background: #654321;
      color: #fffaf0;
      border: 2px solid #4a3520;
      padding: 0.5rem 1rem;
      border-radius: 3px;
      cursor: pointer;
      font-family: 'Patrick Hand', cursive;
      font-size: 1rem;
    }
    .logout-btn:hover {
      background: #4a3520;
    }
    .container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem 0 80px;
    }
    .product-form {
      background: #fffef9;
      padding: 2rem;
      border-radius: 5px;
      margin-bottom: 2rem;
      box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.15);
      border: 2px solid #d4c4a8;
    }
    .product-form h2 {
      margin-bottom: 1rem;
      color: #4a3520;
      font-family: 'Caveat', cursive;
      font-size: 2rem;
      border-bottom: 2px dashed #d4c4a8;
      padding-bottom: 0.5rem;
    }
    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      margin-bottom: 0.3rem;
      color: #5c4033;
      font-weight: bold;
      font-size: 1.1rem;
    }
    input {
      width: 100%;
      padding: 0.6rem;
      border: 2px solid #d4c4a8;
      border-radius: 3px;
      font-size: 1rem;
      font-family: 'Patrick Hand', cursive;
      background: #fffef9;
    }
    input:focus {
      outline: none;
      border-color: #8b4513;
      background: #fff;
    }
    button {
      padding: 0.6rem 1.5rem;
      background: #8b4513;
      color: #fffaf0;
      border: 2px solid #654321;
      border-radius: 3px;
      font-size: 1.1rem;
      font-family: 'Patrick Hand', cursive;
      cursor: pointer;
    }
    button:hover {
      background: #654321;
    }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
    }
    .product-card {
      background: #fffef9;
      border-radius: 5px;
      padding: 1.5rem;
      box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.15);
      border: 2px solid #d4c4a8;
      transition: transform 0.2s;
    }
    .product-card:hover {
      transform: rotate(-1deg) scale(1.02);
    }
    .product-card h3 {
      color: #4a3520;
      margin-bottom: 0.5rem;
      font-size: 1.4rem;
      border-bottom: 1px dashed #d4c4a8;
      padding-bottom: 0.3rem;
    }
    .product-card .category {
      color: #8b4513;
      font-size: 1rem;
      margin-bottom: 0.5rem;
      font-weight: bold;
    }
    .product-card .description {
      color: #665544;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    .product-card .price {
      font-size: 1.6rem;
      font-weight: bold;
      color: #2d5a27;
    }
    .product-card .stock {
      color: #665544;
      font-size: 1rem;
    }
    .product-card .actions {
      margin-top: 1rem;
      display: flex;
      gap: 0.5rem;
    }
    .delete-btn {
      background: #c0392b;
      padding: 0.4rem 0.8rem;
      font-size: 0.95rem;
      border-color: #922b21;
    }
    #message {
      padding: 1rem;
      border-radius: 5px;
      margin-bottom: 1rem;
      display: none;
      font-size: 1.1rem;
    }
    #message.error {
      background: #fde8e8;
      color: #922b21;
      border: 2px solid #c0392b;
      display: block;
    }
    #message.success {
      background: #e8f5e9;
      color: #2d5a27;
      border: 2px solid #27ae60;
      display: block;
    }
  </style>
</head>
<body>
  <header>
    <h1>Gestión de Productos</h1>
    <div class="user-info">
      <span id="userName"></span>
      <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
    </div>
  </header>

  <div class="container">
    <div id="message"></div>

    <div class="product-form">
      <h2>Agregar Producto</h2>
      <form id="productForm">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Nombre</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="form-group">
            <label for="category">Categoría</label>
            <input type="text" id="category" name="category" required>
          </div>
          <div class="form-group">
            <label for="price">Precio</label>
            <input type="number" id="price" name="price" step="0.01" required>
          </div>
          <div class="form-group">
            <label for="stock">Stock</label>
            <input type="number" id="stock" name="stock" required>
          </div>
        </div>
        <div class="form-group">
          <label for="description">Descripción</label>
          <input type="text" id="description" name="description" required>
        </div>
        <button type="submit">Agregar Producto</button>
      </form>
    </div>

    <h2>Lista de Productos</h2>
    <div class="products-grid" id="productsGrid"></div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    
    if (!token) {
      window.location.href = '/login.html';
    }

    const user = JSON.parse(localStorage.getItem('user') || '{}');
    document.getElementById('userName').textContent = user.username || 'Usuario';

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/login.html';
    }

    function showMessage(text, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.textContent = text;
      messageDiv.className = type;
      setTimeout(() => {
        messageDiv.style.display = 'none';
      }, 3000);
    }

    async function loadProducts() {
      try {
        const response = await fetch('/api/products', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (response.status === 401) {
          logout();
          return;
        }

        const products = await response.json();
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = products.map(product => `
          <div class="product-card">
            <h3>${product.name}</h3>
            <div class="category">${product.category}</div>
            <div class="description">${product.description}</div>
            <div class="price">$${product.price.toFixed(2)}</div>
            <div class="stock">Stock: ${product.stock}</div>
            <div class="actions">
              <button class="delete-btn" onclick="deleteProduct('${product._id}')">Eliminar</button>
            </div>
          </div>
        `).join('');
      } catch (error) {
        showMessage('Error al cargar productos', 'error');
      }
    }

    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const productData = {
        name: document.getElementById('name').value,
        category: document.getElementById('category').value,
        price: parseFloat(document.getElementById('price').value),
        stock: parseInt(document.getElementById('stock').value),
        description: document.getElementById('description').value
      };

      try {
        const response = await fetch('/api/products', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(productData)
        });

        if (response.ok) {
          showMessage('Producto agregado exitosamente', 'success');
          document.getElementById('productForm').reset();
          loadProducts();
        } else {
          const data = await response.json();
          showMessage(data.message || 'Error al agregar producto', 'error');
        }
      } catch (error) {
        showMessage('Error de conexión', 'error');
      }
    });

    async function deleteProduct(id) {
      if (!confirm('¿Estás seguro de eliminar este producto?')) return;

      try {
        const response = await fetch(`/api/products/${id}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (response.ok) {
          showMessage('Producto eliminado', 'success');
          loadProducts();
        } else {
          showMessage('Error al eliminar producto', 'error');
        }
      } catch (error) {
        showMessage('Error de conexión', 'error');
      }
    }

    loadProducts();
  </script>
</body>
</html>
